<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Apartments, Flats for Rent in Greater Kailash II, Delhi | NoBroker Rental Houses in
        Greater Kailash II</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <img src="https://assets.nobroker.in/static/img/logos/nb_logo_new_trans.svg">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item dropdown ms-n4">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Rent
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Residential</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Commercial</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
            <div>
                <button type="button" class="btn btn-outline-secondary">
                    <img src="https://assets.nobroker.in/nb-new/public/payrent.png">
                    <span> | </span> Pay Tuition Fees
                </button>
                <button type="button" class="btn btn-success">Post Your Property</button>

                <button type="button" class="btn">
                    Sign Up
                </button>
                <button type="button" class="btn">
                    Log in
                </button>
                <button type="button" class="btn">
                    <img src="https://assets.nobroker.in/nb-new/public/shortlistNotification.svg">
                </button>
                <button type="button" class="btn"><img
                        src="https://assets.nobroker.in/nb-new/public/hamburger-menu.svg">
                    Menu
                </button>
            </div>
    </nav>
    <hr>

    <div class="container text-center">
        <div class="row">
            <div class="col-6">
                <form class="d-flex" role="search">
                    <input class="form-control" type="search" placeholder="Search upto 3 localities or landmarks"
                        aria-label="Search" />

                    <button class="btn btn-danger" type="submit">
                        Search
                    </button>

                    <button type="button" class="btn btn-secondory mx-5">
                        Save Search
                    </button>
                </form>
            </div>
            <div class="col-4">
            </div>
            <div class="col">
                <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                    <input type="radio" class="btn-check" name="btnradio" id="btnradio1" autocomplete="off" checked>
                    <label class="btn btn-outline-danger" for="btnradio1">
                        <img src="https://assets.nobroker.in/nb-new/public/BuilderProjectsListPage/listIconWhite.svg">
                        List
                    </label>

                    <input type="radio" class="btn-check" name="btnradio" id="btnradio2" autocomplete="off">
                    <label class="btn btn-outline-danger " for="btnradio2">
                        <img src="https://assets.nobroker.in/nb-new/public/BuilderProjectsListPage/mapIcon.svg">
                        Map
                    </label>
                </div>
            </div>

        </div>
    </div>
    <hr>

    <div class="container text-center mt-4">
        <div class="row">
            <div class="col-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="container text-center">
                            <div class="row row-cols">

                                <div class="btn-group" role="group" aria-label="Basic radio toggle button group">
                                    <button type="button" class="btn btn-outline-secondary ">Filters</button>
                                    <button type="button" class="btn btn-outline-secondary btn-lg">Premium
                                        Filters
                                    </button>
                                </div>
                                <div class="filter-card">
                                    <h6 class="float-start"><strong>BHK Type</strong></h6>
                                    <div class="d-flex flex-wrap gap-3 mt-4">
                                        <button class="btn active-btn bhk-btn">1 RK</button>
                                        <button class="btn active-btn bhk-btn">1 BHK</button>
                                        <button class="btn btn-light bhk-btn">2 BHK</button>
                                        <button class="btn btn-light bhk-btn">3 BHK</button>
                                        <button class="btn btn-light bhk-btn">4 BHK</button>
                                        <button class="btn btn-light bhk-btn">4+ BHK</button>
                                    </div><br>
                                    <div class="float-start">
                                        <h6><strong>Range: ₹ 13 k to ₹ 85 k</strong></h6>
                                    </div><br>

                                    <input type="range" class="form-range" min="0" max="500000" step="0.5" id="range3">

                                    <div class="mt-5">
                                        <div class="float-start">
                                            <h6><strong>Properties within next 2 days</strong></h6>
                                        </div><br>
                                        <div class="form-check mt-3">
                                            <input class="form-check-input" type="checkbox">
                                            <label class="form-check-label">
                                                Show properties where owner is hosting a visit
                                            </label>
                                        </div>
                                    </div>
                                    <h6 class=""><strong>Availability</strond>
                                    </h6>
                                    <div class="row availability mb-4">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="availability">
                                                <label class="form-check-label">Immediate</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="availability">
                                                <label class="form-check-label">Within 30 Days</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="availability">
                                                <label class="form-check-label">Within 15 Days</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="radio" name="availability">
                                                <label class="form-check-label">After 30 Days</label>
                                            </div>
                                        </div>
                                    </div>
                                    <h6 class="section-title"><strong>Tenants</strong></h6>
                                    <div class="row tenants mb-5">
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox">
                                                <label class="form-check-label">Family</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox">
                                                <label class="form-check-label">Bachelor Male</label>
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox">
                                                <label class="form-check-label">Company</label>
                                            </div>
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox">
                                                <label class="form-check-label">Bachelor Female</label>
                                            </div>
                                        </div>
                                    </div>
                                    <h6 class="section-title"><strong>Type</strong></h6>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox">
                                        <label class="form-check-label">Gated Societies</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
